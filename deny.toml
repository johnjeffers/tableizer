# cargo-deny configuration. Run with `cargo deny check`.
# Enforces a permissive-license-only dependency tree (matches the project's MIT OR Apache-2.0).

[licenses]
# Allow the permissive licenses common in the Rust ecosystem. encoding_rs is MPL-2.0
# (file-level copyleft) and is intentionally allowed; it is compatible with a permissive app.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"

[advisories]
# Fail on security advisories in the dependency tree.
yanked = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
